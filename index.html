<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TOBLOCKS V5</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>🧱 TOBLOCKS</h1>
  <div class="user-menu">
    <button onclick="register()">Créer compte</button>
    <button onclick="login()">Connexion</button>
    <button onclick="logout()">Déconnexion</button>
  </div>
</header>

<main>
  <section class="games-menu">
    <button onclick="startGame()">Jouer au jeu sélectionné</button>
    <button onclick="changeSkin()">Changer Skin</button>
    <button onclick="generateGame()">Créer jeu IA</button>
  </section>

  <canvas id="gameCanvas" width="900" height="500"></canvas>

  <section class="multi-games">
    <h2>🎮 Jeux disponibles</h2>
    <div id="gamesList"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="game.js"></script>
<script src="ai.js"></script>
</body>
</html>
